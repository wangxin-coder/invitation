<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>邀请函 - 二维码</title>
    <style>
        :root {
            --gold: #c9a96e;
            --bg: #faf8f5;
            --text: #3d3328;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #fdf6ee, #faf3e6, #fdf8f2);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 440px;
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 8px 60px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.04);
            padding: 40px 32px;
            text-align: center;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 24px;
            color: var(--text);
            margin-bottom: 8px;
            letter-spacing: 0.05em;
        }
        .subtitle {
            font-size: 14px;
            color: #8b7a60;
            margin-bottom: 28px;
        }

        .qr-wrapper {
            display: inline-block;
            padding: 16px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.06);
            border: 2px solid #f0e8d5;
            margin-bottom: 24px;
        }

        .qr-wrapper img {
            display: block;
            width: 260px;
            height: 260px;
            border-radius: 8px;
        }

        .url-box {
            display: flex;
            align-items: center;
            background: #fdf8f2;
            border: 1px solid #e8dcc8;
            border-radius: 12px;
            padding: 12px 16px;
            gap: 10px;
            margin-bottom: 24px;
            word-break: break-all;
        }
        .url-text {
            flex: 1;
            font-size: 14px;
            color: #3d3328;
            font-family: monospace;
            text-align: left;
        }
        .copy-btn {
            background: var(--gold);
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            font-weight: 500;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .copy-btn:hover { opacity: 0.9; }
        .copy-btn:active { transform: scale(0.96); }
        .copied { background: #4caf50 !important; }

        .steps {
            text-align: left;
            background: #fdfaf5;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #f0e8d5;
        }
        .steps h3 {
            font-size: 14px;
            color: var(--text);
            margin-bottom: 12px;
            text-align: center;
        }
        .step {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 10px;
            font-size: 13px;
            color: #5a4e3e;
            line-height: 1.6;
        }
        .step-num {
            width: 22px;
            height: 22px;
            min-width: 22px;
            background: var(--gold);
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 600;
        }

        .note {
            margin-top: 16px;
            font-size: 12px;
            color: #b0a38a;
            padding: 12px;
            background: #fffbf5;
            border-radius: 8px;
            border: 1px dashed #e8dcc8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-icon">📨</div>
        <h1>邀请函二维码</h1>
        <p class="subtitle">用手机相机扫描二维码即可打开邀请函</p>

        <div class="qr-wrapper">
            <img src="qrcode-public.png" alt="邀请函二维码">
        </div>

        <div class="url-box">
            <span class="url-text" id="url">https://fresh-bees-hunt.loca.lt</span>
            <button class="copy-btn" onclick="copyURL()" id="copyBtn">复制链接</button>
        </div>

        <div class="steps">
            <h3>📱 使用步骤</h3>
            <div class="step">
                <span class="step-num">1</span>
                <span>用手机<strong>相机</strong>或<strong>微信扫一扫</strong>扫描上方二维码</span>
            </div>
            <div class="step">
                <span class="step-num">2</span>
                <span>手机浏览器将自动打开精美的邀请函页面 🎉</span>
            </div>
            <div class="step">
                <span class="step-num">3</span>
                <span>将二维码图片发送给朋友，<strong>任何地方都能打开</strong></span>
            </div>
        </div>

        <div class="note">
            🌐 <strong>全球可访问！</strong>无需同一WiFi，任何人任何地方扫码都能看到邀请函。<br>
            ⚠️ 此链接依赖本机服务运行，<strong>不要关闭终端窗口</strong>。<br>
            💡 如需<strong>永久链接</strong>（电脑关机也能用），建议用 <a href="https://app.netlify.com/drop" target="_blank">Netlify Drop</a>（拖拽文件夹即部署，1分钟搞定）。
        </div>
    </div>

    <script>
        function copyURL() {
            const url = document.getElementById('url').textContent;
            navigator.clipboard.writeText(url).then(() => {
                const btn = document.getElementById('copyBtn');
                btn.textContent = '已复制 ✓';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = '复制链接';
                    btn.classList.remove('copied');
                }, 2000);
            }).catch(() => {
                prompt('请手动复制链接：', url);
            });
        }
    </script>
</body>
</html>
